<!DOCTYPE html>
<html>
<head>
    <title>Form Data</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
        }

        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">CRUD App</span>
    </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="height:90vh;">
    
    <div class="card p-4 shadow" style="width:400px;">
        <h3 class="text-center mb-3">Tambah Data</h3>

        <form id="formData">
            <input type="text" id="nama" class="form-control mb-3" placeholder="Nama" required>
            <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

            <button class="btn btn-primary w-100">Simpan</button>
        </form>

        <a href="data.html" class="btn btn-outline-success mt-3">Lihat Data</a>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$('#formData').submit(function(e){
    e.preventDefault();

    $.ajax({
        url: '/api/data',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({
            nama: $('#nama').val(),
            email: $('#email').val()
        }),
        success: function(){
            alert('✅ Data berhasil disimpan');
            $('#formData')[0].reset();
        }
    });
});
</script>

</body>
</html>
