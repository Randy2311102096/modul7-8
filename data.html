<!DOCTYPE html>
<html>
<head>
    <title>Data User</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">

    <style>
        body {
            background: #f5f7fa;
        }

        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">Data User</span>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4">
        <h4 class="mb-3">Daftar Data</h4>

        <table id="myTable" class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nama</th>
                    <th>Email</th>
                    <th>Aksi</th>
                </tr>
            </thead>
        </table>

        <a href="index.html" class="btn btn-success mt-3">+ Tambah Data</a>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

<script>
$(document).ready(function(){

    $('#myTable').DataTable({
        ajax: {
            url: '/api/data',
            dataSrc: ''
        },
        columns: [
            { data: 'id' },
            { data: 'nama' },
            { data: 'email' },
            {
                data: null,
                render: function(data){
                    return `
                        <button onclick="hapus(${data.id})" class="btn btn-danger btn-sm">Hapus</button>
                        <a href="edit.html?id=${data.id}" class="btn btn-warning btn-sm">Edit</a>
                    `;
                }
            }
        ]
    });

});

function hapus(id){
    if(confirm('Yakin hapus data?')){
        $.ajax({
            url: '/api/data/' + id,
            method: 'DELETE',
            success: function(){
                location.reload();
            }
        });
    }
}
</script>

</body>
</html>
